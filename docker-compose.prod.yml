services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3007:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${SITE_URL:-https://contentthailand.com}
      - NEXT_PUBLIC_GA_ID=${GA_MEASUREMENT_ID}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # strapi:
