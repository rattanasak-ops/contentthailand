  <!-- Upper wing (orange) -->
  <path d="M76 58C74 42 80 28 88 12C96 20 100 34 96 50C93 64 82 80 66 92C78 78 80 66 76 58Z" fill="url(#grad-orange)"/>

  <!-- Top accent (yellow-orange) -->
  <path d="M96 50C100 34 96 22 92 14C102 24 106 38 102 54C98 68 88 80 74 90C86 78 94 64 96 50Z" fill="#F7941D"/>
</svg>
