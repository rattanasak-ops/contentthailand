<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Content Thailand Official Logo - Stylized Phoenix/Bird -->
  <defs>
    <linearGradient id="grad-orange" x1="0.5" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F7941D"/>
      <stop offset="100%" stop-color="#F15A29"/>
    </linearGradient>
    <linearGradient id="grad-pink" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EC1C72"/>
      <stop offset="60%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0.5" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>

  <!-- Main body curve (purple) - the C/tail shape -->
