  <!-- Thai Text -->
  <text x="95" y="40" font-family="'Noto Sans Thai', sans-serif" font-size="22" font-weight="600" fill="#702874">&#xE01;&#xE23;&#xE30;&#xE17;&#xE23;&#xE27;&#xE07;&#xE27;&#xE31;&#xE12;&#xE19;&#xE18;&#xE23;&#xE23;&#xE21;</text>
