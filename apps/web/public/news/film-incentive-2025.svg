      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="50%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#0d3311"/>
    </linearGradient>
    <linearGradient id="ov" x1="0%" y1="100%" x2="0%" y2="0%">
