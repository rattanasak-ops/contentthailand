      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="50%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="ov" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#000;stop-opacity:0"/>
