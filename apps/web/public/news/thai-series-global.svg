  <circle cx="400" cy="100" r="30" fill="none" stroke="#E040FB" stroke-width="2" opacity="0.3"/>
  <g transform="translate(400,210)" text-anchor="middle">
    <text font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Thai Series</text>
    <text font-family="sans-serif" font-size="32" fill="#E040FB" dy="45">Global Hit on Netflix</text>
