<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="50%" style="stop-color:#bf360c"/>
      <stop offset="100%" style="stop-color:#4e342e"/>
    </linearGradient>
    <linearGradient id="ov" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#000;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#ov)"/>
  <g opacity="0.08" fill="white">
    <rect x="100" y="120" width="250" height="15" rx="2"/>
    <rect x="100" y="150" width="200" height="15" rx="2"/>
    <rect x="100" y="180" width="300" height="15" rx="2"/>
    <rect x="100" y="210" width="180" height="15" rx="2"/>
  </g>
  <g transform="translate(400,210)" text-anchor="middle">
    <text font-family="sans-serif" font-size="34" font-weight="bold" fill="white">Screenwriting Workshop</text>
    <text font-family="sans-serif" font-size="24" fill="#FFAB40" dy="42">Batch 15 Now Open</text>
    <text font-family="sans-serif" font-size="16" fill="white" opacity="0.5" dy="35">February 2025</text>
  </g>
</svg>