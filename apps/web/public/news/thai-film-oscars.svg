  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#ov)"/>
  <circle cx="400" cy="120" r="50" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.4"/>
  <text x="400" y="130" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#FFD700" dominant-baseline="middle">OSCAR</text>
  <g transform="translate(400,230)" text-anchor="middle">
    <text font-family="sans-serif" font-size="32" font-weight="bold" fill="white">Thai Film Nominated</text>
    <text font-family="sans-serif" font-size="28" fill="white" opacity="0.8" dy="40">for Oscars 2024</text>
    <text font-family="sans-serif" font-size="16" fill="#FFD700" opacity="0.7" dy="40">December 2024</text>
