<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#00838F"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#000;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#overlay)"/>
  <g transform="translate(400,150)" text-anchor="middle">
    <text font-family="sans-serif" font-size="50" font-weight="bold" fill="#00BCD4" letter-spacing="6">
      <tspan x="0" dy="0">HORMONES</tspan>
    </text>
    <text font-family="sans-serif" font-size="28" fill="white" opacity="0.8">
      <tspan x="0" dy="50">The Series</tspan>
    </text>
    <text font-family="sans-serif" font-size="20" fill="white" opacity="0.6">
      <tspan x="0" dy="50">2013-2015 | 39 Episodes | GMM 25</tspan>
    </text>
    <text font-family="sans-serif" font-size="16" fill="white" opacity="0.4">
      <tspan x="0" dy="35">Drama</tspan>
    </text>
  </g>
  <g opacity="0.06" fill="white">
    <circle cx="100" cy="350" r="60"/>
    <circle cx="700" cy="100" r="40"/>
    <circle cx="650" cy="380" r="30"/>
  </g>
</svg>