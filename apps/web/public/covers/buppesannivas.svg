    </text>
    <text font-family="sans-serif" font-size="22" fill="white" opacity="0.6">
      <tspan x="0" dy="50">Channel 3 | Drama Romance Historical</tspan>
    </text>
  </g>
  <line x1="250" y1="320" x2="550" y2="320" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <rect x="20" y="20" width="760" height="410" rx="8" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.15"/>
