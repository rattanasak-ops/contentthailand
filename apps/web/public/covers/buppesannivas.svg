<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="50%" style="stop-color:#C9920A"/>
      <stop offset="100%" style="stop-color:#6B3A0A"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.7"/>
      <stop offset="60%" style="stop-color:#000;stop-opacity:0.1"/>
    </linearGradient>
    <pattern id="temple" patternUnits="userSpaceOnUse" width="60" height="60">
      <path d="M30 5 L35 20 L50 20 L38 30 L42 45 L30 36 L18 45 L22 30 L10 20 L25 20Z" fill="rgba(255,215,0,0.06)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#template)"/>
  <rect width="800" height="450" fill="url(#overlay)"/>
  <g transform="translate(400,180)" text-anchor="middle">
